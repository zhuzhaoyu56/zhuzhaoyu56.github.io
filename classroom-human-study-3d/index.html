<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="基于 Three.js 的教室人物模型三维可视化页面" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>课堂人物三维可视化</title>
    <script type="module" crossorigin src="./assets/index-DXL4B7Qs.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BRptOWAr.css">
  </head>
  <body>
    <div id="app">
      <main id="scene-root" aria-label="三维教室场景"></main>

      <section class="panel panel-main" aria-label="展示控制台">
        <div class="brand">
          <div>
            <p class="eyebrow">Web 3D Viewer</p>
            <h1>课堂人物三维可视化</h1>
          </div>
          <span id="load-state" class="state-pill">加载中</span>
        </div>

        <div class="action-grid" role="group" aria-label="人物动作">
          <button class="tool-button active" data-action="study" title="学习">
            <i data-lucide="book-open"></i>
            <span>学习</span>
          </button>
          <button class="tool-button" data-action="flip" title="翻书">
            <i data-lucide="book-marked"></i>
            <span>翻书</span>
          </button>
          <button class="tool-button" data-action="walk" title="走动">
            <i data-lucide="footprints"></i>
            <span>走动</span>
          </button>
          <button class="tool-button" data-action="punch" title="挥拳">
            <i data-lucide="hand-fist"></i>
            <span>挥拳</span>
          </button>
          <button class="tool-button" data-action="idle" title="展示">
            <i data-lucide="person-standing"></i>
            <span>展示</span>
          </button>
        </div>

        <div class="control-block">
          <label for="speed-range">动作速度 <output id="speed-value">1.00x</output></label>
          <input id="speed-range" type="range" min="0.35" max="1.8" step="0.05" value="1" />
        </div>

        <div class="segmented" role="group" aria-label="相机视角">
          <button class="active" data-camera="overview" title="总览">
            <i data-lucide="scan-eye"></i>
          </button>
          <button data-camera="desk" title="课桌">
            <i data-lucide="table-2"></i>
          </button>
          <button data-camera="follow" title="跟随">
            <i data-lucide="camera"></i>
          </button>
          <button data-camera="top" title="俯视">
            <i data-lucide="map"></i>
          </button>
        </div>

        <div class="toggle-row">
          <label>
            <input id="toggle-skeleton" type="checkbox" />
            <span>骨骼</span>
          </label>
          <label>
            <input id="toggle-colliders" type="checkbox" />
            <span>碰撞</span>
          </label>
          <label>
            <input id="toggle-night" type="checkbox" />
            <span>夜间</span>
          </label>
        </div>
      </section>

      <section class="panel panel-status" aria-label="状态数据">
        <div class="readout">
          <span>动作</span>
          <strong id="action-readout">学习</strong>
        </div>
        <div class="readout">
          <span>速度</span>
          <strong id="speed-readout">0.00 m/s</strong>
        </div>
        <div class="readout">
          <span>位置</span>
          <strong id="position-readout">(0.00, 0.00)</strong>
        </div>
        <div class="readout">
          <span>模型</span>
          <strong id="model-readout">makehuman.fbx</strong>
        </div>
        <div class="readout">
          <span>骨骼</span>
          <strong id="bones-readout">0</strong>
        </div>
        <div class="readout">
          <span>面数</span>
          <strong id="triangles-readout">0</strong>
        </div>
      </section>

      <section id="loading-panel" class="loading-panel" aria-live="polite">
        <div class="loader-ring"></div>
        <div>
          <h2>正在载入人物模型</h2>
          <p id="loading-text">准备教室场景</p>
          <div class="progress-track">
            <span id="progress-bar"></span>
          </div>
        </div>
      </section>
    </div>

  </body>
</html>
